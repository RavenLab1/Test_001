<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Clicker Configurator</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <h1>صمم الكلكر الخاص بك</h1>
    </header>

    <!-- Main -->
    <main class="container">

        <!-- 3D Viewer -->
        <section class="viewer-section">

            <div id="viewer">

                <!-- سيتم عرض نموذج GLB هنا -->

            </div>

        </section>

        <!-- Configurator -->
        <aside class="configurator">

            <h2>التخصيص</h2>

            <div id="options">

                <!-- الخيارات ستظهر هنا -->

            </div>

        </aside>

    </main>

    <!-- Footer -->
    <footer class="footer">

        <div class="price-box">

            <h2>السعر</h2>

            <span id="price">0 $</span>

        </div>

        <button id="addToCart">
            إضافة إلى السلة
        </button>

    </footer>

    <!-- JavaScript -->
    <script type="module" src="js/app.js"></script>

</body>

</html>
